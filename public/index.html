<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeSprint — Typing Speed for Coders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --border:    #232738;
      --muted:     #3a3f58;
      --text:      #e2e4f0;
      --sub:       #6b7096;
      --accent:    #7c6af7;
      --accent2:   #4fd1c5;
      --green:     #52e89e;
      --red:       #f26d85;
      --yellow:    #f6c95e;
      --radius:    10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .tab-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--sub);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn:hover   { color: var(--text); border-color: var(--border); }
    .tab-btn.active  { color: var(--accent); background: rgba(124,106,247,.1); border-color: rgba(124,106,247,.3); }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ── Filters bar ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.72rem;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-right: 4px;
    }

    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--sub);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .18s;
    }
    .pill:hover  { border-color: var(--muted); color: var(--text); }
    .pill.active { background: rgba(124,106,247,.15); border-color: var(--accent); color: var(--accent); }

    /* ── Exercise card ── */
    #exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 20px;
      position: relative;
    }

    .ex-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .ex-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .lang-badge {
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(79,209,197,.1);
      border: 1px solid rgba(79,209,197,.25);
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .diff-badge {
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .diff-badge.easy   { background: rgba(82,232,158,.1); border: 1px solid rgba(82,232,158,.25); color: var(--green); }
    .diff-badge.medium { background: rgba(246,201,94,.1);  border: 1px solid rgba(246,201,94,.25);  color: var(--yellow); }
    .diff-badge.hard   { background: rgba(242,109,133,.1); border: 1px solid rgba(242,109,133,.25); color: var(--red); }

    /* ── Snippet display ── */
    #snippet-display {
      position: relative;
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre;
      overflow-x: auto;
      min-height: 60px;
    }

    #snippet-display .char { position: relative; }
    #snippet-display .char.correct { color: var(--green); }
    #snippet-display .char.wrong   { color: var(--red); background: rgba(242,109,133,.15); border-radius: 2px; }
    #snippet-display .char.cursor {
      border-left: 2px solid var(--accent);
      animation: blink 1s step-end infinite;
    }
    #snippet-display .char.pending { color: var(--muted); }

    @keyframes blink { 50% { border-color: transparent; } }

    /* ── Hidden textarea ── */
    #typing-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    /* ── Stats bar during typing ── */
    .live-stats {
      display: flex;
      gap: 24px;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 1.6rem; font-weight: 500; color: var(--text); line-height: 1; }
    .stat-unit  { font-size: 0.65rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }

    /* ── Buttons ── */
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      border: none;
      padding: 10px 22px;
      border-radius: 7px;
      cursor: pointer;
      transition: all .18s;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--sub);
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      align-items: center;
    }

    /* ── Results overlay ── */
    #results-overlay {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
      margin-bottom: 20px;
      text-align: center;
    }
    #results-overlay.show { display: block; }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 28px;
      color: var(--text);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .result-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 12px;
    }
    .result-box .val { font-size: 2.2rem; font-weight: 500; line-height: 1; }
    .result-box .lbl { font-size: 0.65rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
    .result-box.wpm  .val { color: var(--accent); }
    .result-box.acc  .val { color: var(--green); }
    .result-box.err  .val { color: var(--red); }
    .result-box.time .val { color: var(--yellow); }

    /* ── History view ── */
    .history-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .stats-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .summary-box .sv { font-size: 1.8rem; font-weight: 500; color: var(--accent); }
    .summary-box .sl { font-size: 0.65rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--sub);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 22px;
      font-size: 0.82rem;
      color: var(--text);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Hint ── */
    .hint {
      font-size: 0.72rem;
      color: var(--sub);
      text-align: center;
      padding: 10px;
    }

    /* ── Loading spinner ── */
    .loading {
      color: var(--sub);
      font-size: 0.85rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">type<span>sprint</span></div>
  <div class="nav-links">
    <button class="tab-btn active" onclick="switchView('practice')">practice</button>
    <button class="tab-btn"        onclick="switchView('history')">history</button>
  </div>
</header>

<main>

  <!-- ── Practice View ── -->
  <div id="view-practice" class="view active">

    <div class="filters">
      <span class="filter-label">difficulty:</span>
      <button class="pill active" data-diff="" onclick="setDifficulty(this, '')">all</button>
      <button class="pill" data-diff="easy"   onclick="setDifficulty(this, 'easy')">easy</button>
      <button class="pill" data-diff="medium" onclick="setDifficulty(this, 'medium')">medium</button>
      <button class="pill" data-diff="hard"   onclick="setDifficulty(this, 'hard')">hard</button>
    </div>

    <div id="exercise-card">
      <div class="ex-meta">
        <span class="ex-title" id="ex-title">Loading…</span>
        <span class="lang-badge" id="ex-lang"></span>
        <span class="diff-badge" id="ex-diff"></span>
      </div>

      <div id="snippet-display" tabindex="0" onclick="focusInput()"></div>
      <textarea id="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" tabindex="-1"></textarea>

      <div class="live-stats">
        <div class="stat-item">
          <span class="stat-value" id="live-wpm">0</span>
          <span class="stat-unit">wpm</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="live-acc">100%</span>
          <span class="stat-unit">accuracy</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="live-errors">0</span>
          <span class="stat-unit">errors</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="live-time">0s</span>
          <span class="stat-unit">time</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="loadExercise()">↻ new snippet</button>
        <button class="btn btn-ghost" onclick="resetExercise()">⟳ restart</button>
      </div>

      <p class="hint">click the code above to start typing</p>
    </div>

    <!-- Results -->
    <div id="results-overlay">
      <div class="results-title">✦ done</div>
      <div class="results-grid">
        <div class="result-box wpm">
          <div class="val" id="res-wpm">—</div>
          <div class="lbl">WPM</div>
        </div>
        <div class="result-box acc">
          <div class="val" id="res-acc">—</div>
          <div class="lbl">accuracy</div>
        </div>
        <div class="result-box err">
          <div class="val" id="res-errors">—</div>
          <div class="lbl">errors</div>
        </div>
        <div class="result-box time">
          <div class="val" id="res-time">—</div>
          <div class="lbl">seconds</div>
        </div>
      </div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="loadExercise()">next snippet</button>
        <button class="btn btn-ghost"   onclick="resetExercise()">try again</button>
      </div>
    </div>

  </div>

  <!-- ── History View ── -->
  <div id="view-history" class="view">

    <div class="history-title">your history</div>

    <div class="stats-summary">
      <div class="summary-box"><div class="sv" id="st-attempts">—</div><div class="sl">total runs</div></div>
      <div class="summary-box"><div class="sv" id="st-best">—</div><div class="sl">best WPM</div></div>
      <div class="summary-box"><div class="sv" id="st-avg-wpm">—</div><div class="sl">avg WPM</div></div>
      <div class="summary-box"><div class="sv" id="st-avg-acc">—</div><div class="sl">avg accuracy</div></div>
    </div>

    <div id="history-table-wrap">
      <p class="loading">loading…</p>
    </div>

  </div>

</main>

<div id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let currentExercise = null;
let difficulty = '';
let typed = '';
let startTime = null;
let timerInterval = null;
let finished = false;
let lastRenderLen = -1;

const input    = document.getElementById('typing-input');
const display  = document.getElementById('snippet-display');
const overlay  = document.getElementById('results-overlay');

// ─── View switching ───────────────────────────────────────────────────────────
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'history') loadHistory();
}

// ─── Difficulty ───────────────────────────────────────────────────────────────
function setDifficulty(el, val) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  difficulty = val;
  loadExercise();
}

// ─── Load exercise ────────────────────────────────────────────────────────────
async function loadExercise() {
  resetState();
  try {
    const url = `/api/exercises/random${difficulty ? `?difficulty=${difficulty}` : ''}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('No exercises found for that difficulty');
    currentExercise = await res.json();

    document.getElementById('ex-title').textContent = currentExercise.title;
    const langEl = document.getElementById('ex-lang');
    langEl.textContent = currentExercise.language;
    const diffEl = document.getElementById('ex-diff');
    diffEl.textContent = currentExercise.difficulty;
    diffEl.className = `diff-badge ${currentExercise.difficulty}`;

    renderSnippet();
  } catch (err) {
    toast(err.message, true);
  }
}

// ─── Render snippet ───────────────────────────────────────────────────────────
function renderSnippet() {
  if (!currentExercise) return;
  if (lastRenderLen === typed.length && !finished) return;
  lastRenderLen = typed.length;

  const target = currentExercise.snippet;
  let html = '';

  for (let i = 0; i < target.length; i++) {
    const ch = target[i] === '\n' ? '↵\n' : target[i] === ' ' ? '\u00A0' : target[i];
    const isCursor = i === typed.length && !finished;
    let cls = 'pending';
    if (i < typed.length) {
      cls = typed[i] === target[i] ? 'correct' : 'wrong';
    }
    if (isCursor) cls += ' cursor';
    html += `<span class="char ${cls}">${escHtml(ch)}</span>`;
  }

  display.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Focus / input ────────────────────────────────────────────────────────────
function focusInput() {
  if (finished) return;
  input.focus();
}

display.addEventListener('click', focusInput);

input.addEventListener('input', () => {
  if (finished || !currentExercise) return;

  typed = input.value;
  const target = currentExercise.snippet;

  // Clamp to target length
  if (typed.length > target.length) {
    typed = typed.slice(0, target.length);
    input.value = typed;
  }

  // Start timer on first keystroke
  if (!startTime && typed.length > 0) {
    startTime = Date.now();
    timerInterval = setInterval(updateLiveStats, 200);
  }

  renderSnippet();
  updateLiveStats();

  // Check completion
  if (typed === target) {
    finishExercise();
  }
});

input.addEventListener('keydown', (e) => {
  // Allow Tab as literal tab character
  if (e.key === 'Tab') {
    e.preventDefault();
    const pos = input.selectionStart;
    input.value = input.value.slice(0, pos) + '\t' + input.value.slice(pos);
    input.selectionStart = input.selectionEnd = pos + 1;
    input.dispatchEvent(new Event('input'));
  }
});

// ─── Live stats ───────────────────────────────────────────────────────────────
function updateLiveStats() {
  if (!startTime) return;
  const elapsed = (Date.now() - startTime) / 1000;
  const words   = typed.length / 5;
  const wpm     = elapsed > 0 ? Math.round(words / (elapsed / 60)) : 0;

  const target  = currentExercise?.snippet || '';
  let errors = 0;
  for (let i = 0; i < typed.length; i++) {
    if (typed[i] !== target[i]) errors++;
  }
  const accuracy = typed.length > 0
    ? Math.round((1 - errors / typed.length) * 100)
    : 100;

  document.getElementById('live-wpm').textContent    = wpm;
  document.getElementById('live-acc').textContent    = accuracy + '%';
  document.getElementById('live-errors').textContent = errors;
  document.getElementById('live-time').textContent   = Math.round(elapsed) + 's';
}

// ─── Finish ───────────────────────────────────────────────────────────────────
async function finishExercise() {
  finished = true;
  clearInterval(timerInterval);

  const elapsed = (Date.now() - startTime);
  const elapsedSec = elapsed / 1000;
  const target = currentExercise.snippet;

  let errors = 0;
  for (let i = 0; i < typed.length; i++) {
    if (typed[i] !== target[i]) errors++;
  }
  const wpm      = Math.round((typed.length / 5) / (elapsedSec / 60));
  const accuracy = Math.round((1 - errors / typed.length) * 100);

  // Show results
  document.getElementById('res-wpm').textContent    = wpm;
  document.getElementById('res-acc').textContent    = accuracy + '%';
  document.getElementById('res-errors').textContent = errors;
  document.getElementById('res-time').textContent   = (elapsedSec).toFixed(1);
  overlay.classList.add('show');

  renderSnippet();

  // Save to DB
  try {
    await fetch('/api/results', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        exercise_id: currentExercise.id,
        wpm, accuracy, errors,
        duration_ms: elapsed,
      }),
    });
  } catch (e) {
    console.warn('Could not save result:', e);
  }
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetState() {
  typed = '';
  startTime = null;
  finished = false;
  lastRenderLen = -1;
  clearInterval(timerInterval);
  input.value = '';
  overlay.classList.remove('show');
  document.getElementById('live-wpm').textContent    = '0';
  document.getElementById('live-acc').textContent    = '100%';
  document.getElementById('live-errors').textContent = '0';
  document.getElementById('live-time').textContent   = '0s';
}

function resetExercise() {
  resetState();
  renderSnippet();
}

// ─── History ──────────────────────────────────────────────────────────────────
async function loadHistory() {
  // Stats
  try {
    const res = await fetch('/api/results/stats');
    const s   = await res.json();
    document.getElementById('st-attempts').textContent = s.total_attempts ?? '0';
    document.getElementById('st-best').textContent     = s.best_wpm ?? '—';
    document.getElementById('st-avg-wpm').textContent  = s.avg_wpm  ?? '—';
    document.getElementById('st-avg-acc').textContent  = s.avg_accuracy ? s.avg_accuracy + '%' : '—';
  } catch {}

  // Table
  const wrap = document.getElementById('history-table-wrap');
  wrap.innerHTML = '<p class="loading">loading…</p>';
  try {
    const res  = await fetch('/api/results?limit=30');
    const rows = await res.json();

    if (!rows.length) {
      wrap.innerHTML = '<p class="hint">no runs yet — go practice!</p>';
      return;
    }

    const fmt = (ts) => new Date(ts).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>exercise</th>
            <th>WPM</th>
            <th>accuracy</th>
            <th>errors</th>
            <th>time</th>
            <th>date</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${r.exercise_title ?? '—'} <span class="lang-badge" style="font-size:.6rem">${r.language ?? ''}</span></td>
              <td style="color:var(--accent)">${r.wpm}</td>
              <td style="color:var(--green)">${r.accuracy}%</td>
              <td style="color:var(--red)">${r.errors}</td>
              <td style="color:var(--yellow)">${(r.duration_ms / 1000).toFixed(1)}s</td>
              <td style="color:var(--sub)">${fmt(r.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    wrap.innerHTML = '<p class="hint">Could not load history — is the database running?</p>';
  }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadExercise();
</script>

</body>
</html>
